spring.application.name=device-service

# DB Configuration
# Datasource
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/devicedb}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
# JPA
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# Flyway - Database Migrations
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.jackson.time-zone=UTC

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Actuator
management.endpoints.web.exposure.include=health,info

# Error Handling
spring.web.error.include-stacktrace=never
spring.web.error.include-message=never
spring.web.error.include-binding-errors=never

# Logging
logging.level.root=INFO
logging.level.com.sercan.device_service=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n
